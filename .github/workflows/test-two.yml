name: Flutter Test Two

# ✅ Manual trigger
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          cache: true

      # 3️⃣ Get dependencies
      - name: Flutter Pub Get
        run: flutter pub get

      # 4️⃣ Run Flutter analyze (optional static check)
      - name: Flutter Analyze
        run: flutter analyze

      # 5️⃣ Run Flutter tests (if you have test files)
      - name: Flutter Test
        run: flutter test || true

      # 6️⃣ Build APK (optional)
      - name: Build APK
        run: flutter build apk --debug

      # 7️⃣ Test complete
      - name: Success Message
        run: echo "✅ Test workflow completed successfully!"